name: Verify

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    # This self-hosted runner accepts only trusted main, tag, and manual revisions.
    runs-on: [self-hosted, macOS, ARM64, codex-dmx-proxy-github-macos-arm64]
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Compile and test
        run: |
          set -euo pipefail
          python="/opt/homebrew/bin/python${{ matrix.python-version }}"
          test -x "$python"
          "$python" -m compileall -q proxy watchdog platform_adapters install.py uninstall.py control.py governance.py tests scripts
          "$python" tests/test_package.py
          "$python" tests/test_empty_response_recovery.py
          "$python" tests/test_rolling_handoff.py

  python-windows:
    name: Python ${{ matrix.python-version }} (Windows)
    runs-on: windows-2025
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile and test
        shell: bash
        run: |
          set -euo pipefail
          python --version
          python -m compileall -q proxy watchdog platform_adapters install.py uninstall.py control.py governance.py tests scripts
          python tests/test_package.py
          python tests/test_empty_response_recovery.py
          python tests/test_rolling_handoff.py

  governance:
    name: Governance and presentation
    # This self-hosted runner accepts only trusted main, tag, and manual revisions.
    runs-on: [self-hosted, macOS, ARM64, codex-dmx-proxy-github-macos-arm64]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
        with:
          fetch-depth: 0
      - name: Verify release and source contracts
        run: |
          set -euo pipefail
          python=/opt/homebrew/bin/python3.14
          test -x "$python"
          "$python" scripts/check_release_metadata.py --allow-unpublished-history
          "$python" scripts/check_markdown_presentation.py
          sh scripts/test-github-actions-contract.sh
          sh scripts/test-github-release-workflow.sh
          sh scripts/test-github-provider-projection.sh
          sh scripts/test-gitlab-tagging.sh
          sh scripts/test-github-tagging.sh
          sh scripts/test-publish-gitlab-release.sh
