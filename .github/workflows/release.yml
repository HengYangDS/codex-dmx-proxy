name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v* tag to publish
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.repository }}-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  verify-and-publish:
    name: Verify tag and publish record
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
        with:
          ref: ${{ inputs.tag || github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14"
      - name: Verify provider-native release tag
        env:
          SELECTED_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          case "$SELECTED_TAG" in v*) ;; *) echo "release requires a v* tag" >&2; exit 2 ;; esac
          test "$SELECTED_TAG" = "$(git describe --tags --exact-match HEAD)"
          sh scripts/check-release-tag-signature.sh . "$SELECTED_TAG" github
          python scripts/check_release_metadata.py --tag "$SELECTED_TAG"
          python scripts/check_markdown_presentation.py
          python scripts/test_release_metadata.py
      - name: Publish or verify immutable GitHub release record
        env:
          GH_TOKEN: ${{ github.token }}
          SELECTED_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$SELECTED_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "GitHub release already exists: $SELECTED_TAG"
          else
            gh release create "$SELECTED_TAG" --repo "$GITHUB_REPOSITORY" \
              --verify-tag --title "Codex DMX Proxy $SELECTED_TAG" --generate-notes
          fi
