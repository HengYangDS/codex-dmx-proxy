workflow:
  rules:
    # A release candidate is validated by its signed tag. Suppress the
    # necessarily untagged preparation branch so an incomplete publication is
    # never represented as a passing mainline release.
    - if: '$CI_COMMIT_BRANCH =~ /^release\// && !$CI_COMMIT_TAG'
      when: never
    - if: '$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^release\//'
      when: never
    - when: always

stages:
  - verify
  - release

.python-verify:
  stage: verify
  image: python:${PYTHON_VERSION}-slim
  script:
    - python --version
    - python -m compileall -q proxy watchdog platform_adapters install.py uninstall.py control.py tests scripts
    - python tests/test_package.py

verify-python-3.12:
  extends: .python-verify
  variables: { PYTHON_VERSION: "3.12" }

verify-python-3.13:
  extends: .python-verify
  variables: { PYTHON_VERSION: "3.13" }

verify-python-3.14:
  extends: .python-verify
  variables: { PYTHON_VERSION: "3.14" }

verify-release-metadata:
  stage: verify
  image: python:3.14-slim
  before_script:
    - apt-get update -qq
    - apt-get install -y --no-install-recommends git openssh-client
    # Shared runners can retain deleted tags in a reused checkout.  Fetching
    # with tag pruning makes the checker reason about the provider's current
    # release namespace, not runner-local history.
    - git fetch --tags --force --prune --prune-tags origin
  script:
    - python scripts/check_release_metadata.py
    - python scripts/check_markdown_presentation.py
    - python scripts/test_release_metadata.py
    - sh scripts/test-publish-gitlab-release.sh
    - sh scripts/test-github-actions-contract.sh
    - sh scripts/test-github-release-workflow.sh
    - sh scripts/test-github-provider-projection.sh
    - sh scripts/test-github-tagging.sh

verify-release-tag:
  stage: release
  image: python:3.14-slim
  rules:
    - if: '$CI_COMMIT_TAG'
  before_script:
    - apt-get update -qq
    - apt-get install -y --no-install-recommends git openssh-client
    - git fetch --tags --force --prune --prune-tags origin
  script:
    - python scripts/check_release_metadata.py --tag "$CI_COMMIT_TAG"
    - sh scripts/check-release-tag-signature.sh . "$CI_COMMIT_TAG" gitlab

publish-gitlab-release:
  stage: release
  image: python:3.14-slim
  needs: [verify-release-tag]
  rules:
    - if: '$CI_COMMIT_TAG'
  before_script:
    - apt-get update -qq
    - apt-get install -y --no-install-recommends curl git
    - git fetch --tags --force --prune --prune-tags origin
  script:
    - python scripts/check_release_metadata.py --tag "$CI_COMMIT_TAG"
    - sh scripts/publish-gitlab-release.sh
